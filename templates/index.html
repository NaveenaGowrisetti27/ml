<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        form {
            background: white;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2 {
            color: green;
        }
    </style>
</head>

<body>

    <h1>Heart Disease Prediction using Random Forest</h1>

    <form action="/predict" method="post">

        <input type="number" name="age" placeholder="Age" required>

        <input type="number" name="sex" placeholder="Sex (0=Female, 1=Male)" required>

        <input type="number" name="cp" placeholder="Chest Pain Type" required>

        <input type="number" name="trestbps" placeholder="Resting BP" required>

        <input type="number" name="chol" placeholder="Cholesterol" required>

        <input type="number" name="fbs" placeholder="Fasting Blood Sugar" required>

        <input type="number" name="restecg" placeholder="Rest ECG" required>

        <input type="number" name="thalach" placeholder="Max Heart Rate" required>

        <input type="number" name="exang" placeholder="Exercise Angina" required>

        <input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required>

        <input type="number" name="slope" placeholder="Slope" required>

        <input type="number" name="ca" placeholder="CA" required>

        <input type="number" name="thal" placeholder="Thal" required>

        <button type="submit">Predict</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
